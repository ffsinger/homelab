services:
  n8n:
    image: n8nio/n8n:${N8N_VERSION:-latest}
    container_name: n8n
    hostname: n8n.internal
    pull_policy: always
    restart: 'unless-stopped'
    ports:
      - "5678:5678"
    environment:
      # Host and network configuration
      - N8N_HOST=n8n.${DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://n8n.${DOMAIN}
      - WEBHOOK_URL=
      # Privacy and telemetry settings (all disabled)
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - EXTERNAL_FRONTEND_HOOKS_URLS=
      - N8N_DIAGNOSTICS_CONFIG_FRONTEND=
      - N8N_DIAGNOSTICS_CONFIG_BACKEND=
      # Task runners configuration (external mode)
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_NATIVE_PYTHON_RUNNER=true
      # Security settings
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - NODE_ENV=production
      # Timezone configuration
      - GENERIC_TIMEZONE=${TIMEZONE}
      - TZ=${TIMEZONE}
    volumes:
      - /opt/n8n/data:/home/node/.n8n
      - /opt/n8n/local-files:/files
    labels:
      - "diun.enable=true"
      - "diun.metadata.changelog=https://github.com/n8n-io/n8n/releases"
      - "diun.metadata.current_version=${N8N_VERSION}"
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.middlewares=private-access@file,n8n@docker"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.middlewares.n8n.headers.SSLRedirect=true"
      - "traefik.http.middlewares.n8n.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.n8n.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.n8n.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.n8n.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.n8n.headers.SSLHost=n8n.${DOMAIN}"
      - "traefik.http.middlewares.n8n.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.n8n.headers.STSPreload=true"
    networks:
      - traefik
      - n8n
  task-runners:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - N8N_VERSION=${N8N_VERSION:-latest}
    container_name: n8n-runners
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n.internal:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
    volumes:
      # Copied the default at https://github.com/n8n-io/n8n/blob/master/docker/images/runners/n8n-task-runners.json and added additional dependencies
      - /opt/n8n/n8n-task-runners.json:/etc/n8n-task-runners.json
    labels:
      - "diun.enable=false"
    depends_on:
      - n8n
    networks:
      - n8n

networks:
  traefik:
    external: true
  n8n:
    name: n8n
    driver: bridge
