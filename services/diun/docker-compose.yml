services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:${DOCKER_SOCKET_PROXY_VERSION:-latest}
    container_name: docker-socket-proxy-diun
    pull_policy: always
    restart: unless-stopped
    privileged: true
    environment:
      # Grant access only to the API endpoints diun needs
      - CONTAINERS=1
      - IMAGES=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "diun.enable=true"
      - "diun.metadata.changelog=https://github.com/Tecnativa/docker-socket-proxy/releases"
      - "diun.metadata.current_version=${DOCKER_SOCKET_PROXY_VERSION}"
    networks:
      socket-proxy:
        aliases:
          - docker-socket-proxy

  diun:
    image: crazymax/diun:${DIUN_VERSION:-latest}
    container_name: diun
    hostname: diun.internal
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    command: serve
    volumes:
      - "/opt/diun/data:/data"
    environment:
      - "TZ=${TIMEZONE}"
      - "DIUN_WATCH_WORKERS=20"
      - "DIUN_WATCH_SCHEDULE=0 3 * * *" # Every day at 3:00 AM
      - "DIUN_WATCH_JITTER=30s"
      - "DIUN_WATCH_FIRSTCHECKNOTIF=true" # Also notify when a new image is added
      - "DIUN_DEFAULTS_WATCHREPO=true"
      - "DIUN_DEFAULTS_MAXTAGS=1" # We only care about new tags, not updates to existing tags
      - "DIUN_DEFAULTS_SORTTAGS=semver"
      - "DIUN_DEFAULTS_NOTIFYON=new"
      - "DIUN_DEFAULTS_INCLUDETAGS=^v?\\d+\\.\\d+\\.\\d+$" # Only include tags that look like versions
      - "DIUN_PROVIDERS_DOCKER=true"
      - "DIUN_PROVIDERS_DOCKER_ENDPOINT=tcp://docker-socket-proxy:2375"
      - "DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=false" # Default behavior without label "diun.enable=true"
      - "DIUN_NOTIF_GOTIFY_ENDPOINT=http://gotify.internal"
      - "DIUN_NOTIF_GOTIFY_TOKEN=${DIUN_NOTIF_GOTIFY_TOKEN}"
      - "DIUN_NOTIF_GOTIFY_TEMPLATETITLE={{ .Entry.Metadata.ctn_names }}{{ if .Entry.Metadata.current_version }} {{ .Entry.Metadata.current_version }}{{ end }} → {{ .Entry.Image.Tag }}"
      - "DIUN_NOTIF_GOTIFY_TEMPLATEBODY={{ if .Entry.Metadata.changelog }}[Changelog]({{ .Entry.Metadata.changelog }}){{ else }}No changelog available{{ end }}"
    labels:
      - "diun.enable=true"
      - "diun.metadata.changelog=https://crazymax.dev/diun/changelog/"
      - "diun.metadata.current_version=${DIUN_VERSION}"
    networks:
      - socket-proxy
      - gotify-notifications

networks:
  socket-proxy:
    name: socket-proxy-diun
    driver: bridge
    internal: true
  gotify-notifications:
    external: true
